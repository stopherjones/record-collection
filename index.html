<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My virtual Record Collection</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="brand">
    <span class="logo">💿</span>
    <div>
      <h1>Virtual Record Collection</h1>
      <div class="subtitle">Browse albums by era, artist, and tags</div>
    </div>
  </div>
  <div class="header-actions">
    <select id="tag-select" class="filter-select" aria-label="Filter records by tag">
      <option value="all">All</option>
    </select>
    <select id="sort-select" class="filter-select" aria-label="Sort records">
      <option value="title">Sort by Title</option>
      <option value="artist">Sort by Artist</option>
      <option value="year">Sort by Year</option>
    </select>
    <button id="random-btn" class="filter-btn">🎲 Random entry</button>
  </div>
</header>

<main>
  <div class="cards" id="cards">
    <div class="loading">
      <div class="spinner"></div>
      Loading record data…
    </div>
  </div>
</main>

<script>
  let allRecords = [];
  let currentFilter = 'all';
  let currentSort = 'title';

  // ── Fetch data ──────────────────────────────────────────────────────────────
  fetch('records.json?_=' + Date.now())
    .then(r => r.json())
    .then(data => {
      allRecords = Array.isArray(data) ? data : [];
      initTagSelect();
      initSortSelect();
      initRandomButton();
      render();
    })
    .catch(err => {
      document.getElementById('cards').innerHTML =
        `<div class="empty">⚠️ Could not load record data.<br><small>${escHtml(err.message)}</small></div>`;
    });

  // ── Render ──────────────────────────────────────────────────────────────────
  function render(highlightIndex) {
    const filtered = getFilteredRecords();

    const sorted = [...filtered].sort((a, b) => {
      if (currentSort === 'year') {
        return (Number(a.year) || 0) - (Number(b.year) || 0);
      }
      const left = String(a[currentSort] || '').toLowerCase();
      const right = String(b[currentSort] || '').toLowerCase();
      return left.localeCompare(right);
    });

    const container = document.getElementById('cards');
    const randomBtn = document.getElementById('random-btn');

    if (randomBtn) {
      randomBtn.disabled = sorted.length === 0;
    }

    if (sorted.length === 0) {
      container.innerHTML = '<div class="empty">No records match this filter.</div>';
      return;
    }

    container.innerHTML = sorted.map((record, index) => cardHTML(record, index)).join('');
    if (typeof highlightIndex === 'number') {
      highlightCardByIndex(highlightIndex);
    }
  }

  function getFilteredRecords() {
    return allRecords.filter(record => {
      return currentFilter === 'all' || (record.tags || []).includes(currentFilter);
    });
  }

  function cardHTML(record, index) {
    const tags = Array.isArray(record.tags) ? record.tags : [];

    return `
      <div class="card" data-card-index="${index}">
        <div class="card-header">
          ${record.thumbnail ? `<img class="card-thumb" src="${escAttr(record.thumbnail)}" alt="${escAttr(record.title || '')}">` : ''}
          <div style="flex:1">
            <div class="card-title">${escHtml(record.title)}</div>
            ${record.artist ? `<div class="card-game">${escHtml(record.artist)}</div>` : ''}
          </div>
        </div>

        <div class="card-meta">
          ${record.year ? `<span>🗓️ ${escHtml(String(record.year))}</span>` : ''}
          ${tags.length ? `<span>🏷️ ${escHtml(tags.join(', '))}</span>` : ''}
        </div>

        <a class="card-link" href="${escAttr(record.url || '#')}" target="_blank" rel="noopener">
          ↗ Open album link
        </a>
      </div>`;
  }

  // ── Filter buttons ──────────────────────────────────────────────────────────
  function initTagSelect() {
    const select = document.getElementById('tag-select');
    if (!select) return;

    const tags = Array.from(new Set(
      allRecords
        .flatMap(record => Array.isArray(record.tags) ? record.tags : [])
        .map(tag => (tag || '').trim())
        .filter(Boolean)
    )).sort((a, b) => a.localeCompare(b));

    select.innerHTML = [
      `<option value="all">All</option>`,
      ...tags.map(tag => `<option value="${escAttr(tag)}">${escHtml(tag)}</option>`)
    ].join('');

    select.value = currentFilter;
    select.addEventListener('change', () => {
      currentFilter = select.value;
      render();
    });
  }

  function initSortSelect() {
    const select = document.getElementById('sort-select');
    if (!select) return;

    select.value = currentSort;
    select.addEventListener('change', () => {
      currentSort = select.value;
      render();
    });
  }

  function initRandomButton() {
    const button = document.getElementById('random-btn');
    if (!button) return;

    button.addEventListener('click', () => {
      const filtered = getFilteredRecords();
      const sorted = [...filtered].sort((a, b) => {
        if (currentSort === 'year') {
          return (Number(a.year) || 0) - (Number(b.year) || 0);
        }
        const left = String(a[currentSort] || '').toLowerCase();
        const right = String(b[currentSort] || '').toLowerCase();
        return left.localeCompare(right);
      });

      if (!sorted.length) return;
      const randomIndex = Math.floor(Math.random() * sorted.length);
      render(randomIndex);
    });
  }

  // ── Utils ───────────────────────────────────────────────────────────────────
  function highlightCardByIndex(index) {
    document.querySelectorAll('.card.highlighted').forEach(card => card.classList.remove('highlighted'));
    const card = document.querySelector(`.card[data-card-index="${index}"]`);
    if (card) {
      card.classList.add('highlighted');
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  function escHtml(str) {
    if (!str) return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function escAttr(str) {
    // For attribute values (we still escape HTML entities for safety)
    return escHtml(str).replace(/'/g, '&#39;');
  }
</script>
</body>
</html>
