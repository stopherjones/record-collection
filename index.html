<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Record Collection</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #23263a;
      --border: #2e3250;
      --accent: #4f8ef7;
      --classic: #7c5cfc;
      --vintage: #f5a623;
      --modern: #27ae60;
      --unknown: #888;
      --text: #e8eaf6;
      --muted: #9095b4;
      --gold: #f5c842;
      --silver: #b0bec5;
      --bronze: #cd7f32;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header .logo { font-size: 2rem; }
    header .subtitle { color: var(--muted); font-size: 0.9rem; margin-top: 2px; }

    main { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 16px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all .15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .filter-select {
      padding: 6px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem;
      transition: border-color .15s;
      min-width: 220px;
    }
    .filter-select:hover { border-color: var(--accent); }
    .filter-select:focus { outline: none; border-color: var(--accent); }

    /* ── Cards ── */
    .cards { display: grid; gap: 20px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      transition: border-color .2s;
    }
    .card:hover { border-color: var(--accent); }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .status-classic { background: #2a1f5e; color: var(--classic); }
    .status-vintage { background: #3d2b00; color: var(--vintage); }
    .status-modern  { background: #0d3320; color: var(--modern); }
    .status-unknown { background: #222; color: var(--unknown); }

    .card-title { font-size: 1.1rem; font-weight: 600; line-height: 1.3; }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .tag-pill {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      font-size: 0.75rem;
    }
    .card-game  { font-size: 0.85rem; color: var(--muted); margin-top: 3px; }

    .card-meta {
      display: flex;
      gap: 18px;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .card-meta span { display: flex; align-items: center; gap: 4px; }

    /* ── Ranking table ── */
    .ranking-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 5px 12px;
      transition: all .15s;
    }
    .ranking-toggle:hover { border-color: var(--accent); color: var(--text); }

    .ranking-table {
      display: none;
      margin-top: 14px;
      overflow-x: auto;
    }
    .ranking-table.open { display: block; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    thead th {
      text-align: left;
      padding: 8px 12px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      font-weight: 500;
    }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 7px 12px; border-bottom: 1px solid var(--border); }

    .rank-1 { color: var(--gold); font-weight: 700; }
    .rank-2 { color: var(--silver); font-weight: 600; }
    .rank-3 { color: var(--bronze); font-weight: 600; }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.8rem;
      color: var(--accent);
      text-decoration: none;
      margin-top: 12px;
    }
    .card-link:hover { text-decoration: underline; }

    /* ── Empty state ── */
    .empty { text-align: center; color: var(--muted); padding: 60px 0; font-size: 1rem; }

    /* ── Loading ── */
    .loading { text-align: center; padding: 80px; color: var(--muted); }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      header { padding: 16px; }
      main { padding: 20px 16px; }
      .card { padding: 16px; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">💿</span>
  <div>
    <h1>Virtual Record Collection</h1>
    <div class="subtitle">Browse albums by era, artist, and tags</div>
  </div>
</header>

<main>
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <div id="tag-buttons" class="filter-group"></div>
    <button id="random-btn" class="filter-btn">🎲 Random entry</button>
    <select id="sort-select" class="filter-select" aria-label="Sort records">
      <option value="title">Sort by Title</option>
      <option value="artist">Sort by Artist</option>
      <option value="year">Sort by Year</option>
    </select>
  </div>

  <div class="cards" id="cards">
    <div class="loading">
      <div class="spinner"></div>
      Loading record data…
    </div>
  </div>
</main>

<script>
  const STATUS_ICON = {
    classic: '🎙️',
    vintage: '💿',
    modern:  '🎧',
    unknown: '❓',
  };

  const STATUS_TEXT = {
    classic: 'Classic',
    vintage: 'Vintage',
    modern:  'Modern',
    unknown: 'Unknown',
  };

  let allRecords = [];
  let currentFilter = 'all';
  let currentSort = 'title';

  function getEra(record) {
    if (!record?.year || typeof record.year !== 'number') return 'unknown';
    if (record.year < 1980) return 'classic';
    if (record.year < 2000) return 'vintage';
    return 'modern';
  }

  // ── Fetch data ──────────────────────────────────────────────────────────────
  fetch('data/records.json?_=' + Date.now())
    .then(r => r.json())
    .then(data => {
      allRecords = Array.isArray(data) ? data : [];
      initTagButtons();
      initSortSelect();
      initRandomButton();
      render();
    })
    .catch(err => {
      document.getElementById('cards').innerHTML =
        `<div class="empty">⚠️ Could not load record data.<br><small>${escHtml(err.message)}</small></div>`;
    });

  // ── Render ──────────────────────────────────────────────────────────────────
  function render() {
    const filtered = getFilteredRecords();

    const sorted = [...filtered].sort((a, b) => {
      if (currentSort === 'year') {
        return (a.year || 0) - (b.year || 0);
      }
      const left = String(a[currentSort] || '').toLowerCase();
      const right = String(b[currentSort] || '').toLowerCase();
      return left.localeCompare(right);
    });

    const container = document.getElementById('cards');
    const randomBtn = document.getElementById('random-btn');

    if (randomBtn) {
      randomBtn.disabled = sorted.length === 0;
    }

    if (sorted.length === 0) {
      container.innerHTML = '<div class="empty">No records match this filter.</div>';
      return;
    }

    container.innerHTML = sorted.map(cardHTML).join('');
  }

  function getFilteredRecords() {
    return allRecords.filter(record => {
      return currentFilter === 'all' || (record.tags || []).includes(currentFilter);
    });
  }

  function cardHTML(record) {
    const era = getEra(record);
    const icon = STATUS_ICON[era];
    const label = STATUS_TEXT[era];
    const tags = Array.isArray(record.tags) ? record.tags : [];

    return `
      <div class="card" data-era="${era}">
        <div class="card-header">
          <div style="flex:1">
            <div class="card-title">${escHtml(record.title)}</div>
            ${record.artist ? `<div class="card-game">${escHtml(record.artist)}</div>` : ''}
          </div>
          <span class="status-pill status-${era}">${icon} ${label}</span>
        </div>

        <div class="card-meta">
          ${record.year ? `<span>🗓️ ${escHtml(String(record.year))}</span>` : ''}
          ${tags.length ? `<span>🏷️ ${escHtml(tags.join(', '))}</span>` : ''}
        </div>

        ${tags.length ? `<div class="tag-list">${tags.map(tag => `<span class="tag-pill">${escHtml(tag)}</span>`).join('')}</div>` : ''}

        <a class="card-link" href="${escAttr(record.url || '#')}" target="_blank" rel="noopener">
          ↗ Open album link
        </a>
      </div>`;
  }

  // ── Filter buttons ──────────────────────────────────────────────────────────
  function initTagButtons() {
    const wrapper = document.getElementById('tag-buttons');
    if (!wrapper) return;

    const tags = Array.from(new Set(
      allRecords
        .flatMap(record => Array.isArray(record.tags) ? record.tags : [])
        .map(tag => (tag || '').trim())
        .filter(Boolean)
    )).sort((a, b) => a.localeCompare(b));

    wrapper.innerHTML = tags.map(tag =>
      `<button class="filter-btn" data-filter="${escAttr(tag)}">${escHtml(tag)}</button>`
    ).join('');

    document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        currentFilter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.toggle('active', b.dataset.filter === currentFilter));
        render();
      });
    });
  }

  function initSortSelect() {
    const select = document.getElementById('sort-select');
    if (!select) return;

    select.value = currentSort;
    select.addEventListener('change', () => {
      currentSort = select.value;
      render();
    });
  }

  function initRandomButton() {
    const button = document.getElementById('random-btn');
    if (!button) return;

    button.addEventListener('click', () => {
      const visibleRecords = getFilteredRecords();
      if (!visibleRecords.length) return;
      const randomRecord = visibleRecords[Math.floor(Math.random() * visibleRecords.length)];
      if (randomRecord?.url) {
        window.open(randomRecord.url, '_blank');
      }
    });
  }

  // ── Utils ───────────────────────────────────────────────────────────────────
  function escHtml(str) {
    if (!str) return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function escAttr(str) {
    // For attribute values (we still escape HTML entities for safety)
    return escHtml(str).replace(/'/g, '&#39;');
  }
</script>
</body>
</html>
