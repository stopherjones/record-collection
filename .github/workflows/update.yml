name: Update Virtual Library Data

on:
  push:
    paths:
      - '*.md'

# Global permissions for the runner token
permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Connects this job explicitly to the GitHub Pages system
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Dependencies
      run: pip install spotipy

    # Runs your python script to update library.json
    - name: Run Update Script
      env:
        SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
        SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIPY_CLIENT_SECRET }}
      run: python update_library.py

    # Commits the changes back to your repository
    - name: Commit and Push Changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Automated library.json update from Markdown edit"

    # Prepares your HTML/JSON files to be hosted
    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.' # Uploads everything in the root directory (index.html, library.json, etc.)

    # Officially pushes the live site to the web
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4